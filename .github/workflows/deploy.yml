name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build:cf

      # Exchange refresh token for a new access token (Cloudflare OAuth2 PKCE flow).
      # The refresh token rotates on every use — the new one is saved back to GitHub
      # secrets so the next run always has a valid token.
      - name: Refresh Cloudflare OAuth token
        id: cf_token
        env:
          CF_REFRESH_TOKEN: ${{ secrets.CF_REFRESH_TOKEN }}
          CF_OAUTH_CLIENT_ID: ${{ secrets.CF_OAUTH_CLIENT_ID }}
        run: |
          RESPONSE=$(curl -sf -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token&refresh_token=${CF_REFRESH_TOKEN}&client_id=${CF_OAUTH_CLIENT_ID}")

          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['access_token'])")
          NEW_REFRESH=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['refresh_token'])")

          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
          echo "new_refresh=$NEW_REFRESH" >> "$GITHUB_OUTPUT"

      # Rotate the secret BEFORE deploying so it's always saved, even if deploy fails
      - name: Rotate CF_REFRESH_TOKEN secret
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          echo "${{ steps.cf_token.outputs.new_refresh }}" | \
            gh secret set CF_REFRESH_TOKEN --repo ${{ github.repository }}

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf_token.outputs.access_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist --project-name brandonvisca-com --branch main
