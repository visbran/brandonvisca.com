name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build:cf

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist --project-name brandonvisca-com --branch main --commit-message "deploy $(git rev-parse --short HEAD)"

      - name: Smoke test — homepage (with retries)
        run: |
          for i in {1..6}; do
            if curl -sf -o /dev/null https://brandonvisca.com/; then
              echo "Homepage OK"
              exit 0
            fi
            echo "Attempt $i/6 failed, waiting 10s..."
            sleep 10
          done
          echo "Homepage failed after 6 attempts"
          exit 1

      - name: Smoke test — sitemap
        run: |
          curl -sf -o /dev/null https://brandonvisca.com/sitemap-index.xml || { echo "Sitemap failed"; exit 1; }
          echo "Sitemap OK"

      - name: Smoke test — robots.txt
        run: |
          curl -sf -o /dev/null https://brandonvisca.com/robots.txt || { echo "robots.txt failed"; exit 1; }
          echo "robots.txt OK"

      - name: Smoke test — llms.txt
        run: |
          curl -sf -o /dev/null https://brandonvisca.com/llms.txt || { echo "llms.txt failed"; exit 1; }
          echo "llms.txt OK"
