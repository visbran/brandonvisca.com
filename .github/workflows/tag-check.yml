name: Tag Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/data/blog/**'
  push:
    branches: [main]
    paths:
      - 'src/data/blog/**'

jobs:
  validate-tags:
    name: Validate Article Tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate tags
        run: node scripts/tag-check.mjs
